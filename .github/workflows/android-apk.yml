name: Android APK Build

on:
  workflow_dispatch:
    inputs:
      build_variant:
        description: Build variant
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release
      target_abi:
        description: Target ABI for smaller debug APK
        required: true
        default: arm64-v8a
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a
          - x86_64
      attach_to_release:
        description: Attach APK to GitHub Release (tag builds always attach)
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '21'

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve build variant and ABI
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "REQUESTED_VARIANT=release" >> "$GITHUB_ENV"
            echo "TARGET_ABI=arm64-v8a" >> "$GITHUB_ENV"
          else
            echo "REQUESTED_VARIANT=${{ github.event.inputs.build_variant }}" >> "$GITHUB_ENV"
            echo "TARGET_ABI=${{ github.event.inputs.target_abi }}" >> "$GITHUB_ENV"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets (best effort)
        continue-on-error: true
        run: |
          npm run build -- --webpack

      - name: Ensure fallback web shell for Capacitor
        run: |
          mkdir -p .next
          cat > .next/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Wrong Notebook</title>
          </head>
          <body>
            <div id="root"></div>
            <script>
              window.location.replace('https://wrong-notebook.tjunsh.cn/');
            </script>
          </body>
          </html>
          EOF

      - name: Ensure web assets directory for Capacitor
        run: |
          if [ ! -f ".next/index.html" ]; then
            echo "::error::Capacitor web entry .next/index.html is missing."
            exit 1
          fi

      - name: Ensure Capacitor dependencies
        run: npm install @capacitor/core @capacitor/cli @capacitor/android --no-save

      - name: Ensure Capacitor config exists
        run: |
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            cat > capacitor.config.ts <<'EOF'
          import type { CapacitorConfig } from '@capacitor/cli'

          const config: CapacitorConfig = {
            appId: 'com.tjunsh.wrongnotebook',
            appName: 'Wrong Notebook',
            webDir: '.next',
          }

          export default config
          EOF
          fi

      - name: Generate Android project when missing
        run: |
          if [ ! -d "android" ] || [ ! -f "android/gradlew" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android assets
        run: npx cap sync android

      - name: Apply ABI filter for smaller debug APK
        if: env.REQUESTED_VARIANT == 'debug'
        run: |
          if [ -f "android/app/build.gradle" ]; then
            if ! grep -q "abiFilters" android/app/build.gradle; then
              cat >> android/app/build.gradle <<EOF

android {
    defaultConfig {
        ndk {
            abiFilters '${TARGET_ABI}'
        }
    }
}
EOF
            fi
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Ensure gradlew is executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        if: env.REQUESTED_VARIANT == 'debug'
        run: |
          cd android
          ./gradlew --no-daemon clean assembleDebug

      - name: Build release APK
        if: env.REQUESTED_VARIANT == 'release'
        run: |
          cd android
          ./gradlew --no-daemon clean assembleRelease

      - name: Decode signing keystore
        if: env.REQUESTED_VARIANT == 'release'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "release_signing=false" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/signing-key.jks
          echo "release_signing=true" >> "$GITHUB_ENV"

      - name: Sign release APK with apksigner
        if: env.REQUESTED_VARIANT == 'release' && env.release_signing == 'true'
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "::error::Missing one or more Android signing secrets: ANDROID_KEY_ALIAS / ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_PASSWORD"
            exit 1
          fi
          UNSIGNED_APK="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ ! -f "$UNSIGNED_APK" ]; then
            UNSIGNED_APK="android/app/build/outputs/apk/release/app-release.apk"
          fi
          if [ ! -f "$UNSIGNED_APK" ]; then
            echo "::error::Release APK not found."
            exit 1
          fi
          BUILD_TOOLS_DIR=$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)
          if [ -z "$BUILD_TOOLS_DIR" ]; then
            echo "::error::Android build-tools not found"
            exit 1
          fi
          "$BUILD_TOOLS_DIR/zipalign" -f -v 4 "$UNSIGNED_APK" android/app/build/outputs/apk/release/app-release-aligned.apk
          "$BUILD_TOOLS_DIR/apksigner" sign --ks android/signing-key.jks --ks-key-alias "$ANDROID_KEY_ALIAS" --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" --key-pass "pass:$ANDROID_KEY_PASSWORD" --out android/app/build/outputs/apk/release/app-release-signed.apk android/app/build/outputs/apk/release/app-release-aligned.apk
          "$BUILD_TOOLS_DIR/apksigner" verify --verbose android/app/build/outputs/apk/release/app-release-signed.apk

      - name: Resolve APK path
        id: resolve_apk
        run: |
          if [ "${REQUESTED_VARIANT}" = "debug" ]; then
            ABI_APK="android/app/build/outputs/apk/debug/app-${TARGET_ABI}-debug.apk"
            if [ -f "$ABI_APK" ]; then
              APK_PATH="$ABI_APK"
            else
              APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
            fi
          elif [ "${release_signing}" = "true" ] && [ -f "android/app/build/outputs/apk/release/app-release-signed.apk" ]; then
            APK_PATH="android/app/build/outputs/apk/release/app-release-signed.apk"
          elif [ -f "android/app/build/outputs/apk/release/app-release.apk" ]; then
            APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          else
            APK_PATH="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          fi
          if [ ! -f "$APK_PATH" ]; then
            echo "::error::Expected APK file not found: $APK_PATH"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Prepare versioned APK filename
        id: versioned_name
        run: |
          TS=$(date -u +"%Y%m%d-%H%M%S")
          SHORT_SHA="${GITHUB_SHA:0:7}"
          VARIANT="${REQUESTED_VARIANT}"
          TARGET_NAME="wrong-notebook-${VARIANT}-run${GITHUB_RUN_NUMBER}-${TS}-${SHORT_SHA}.apk"
          cp "${{ steps.resolve_apk.outputs.apk_path }}" "android/${TARGET_NAME}"
          echo "apk_name=${TARGET_NAME}" >> "$GITHUB_OUTPUT"
          echo "apk_versioned_path=android/${TARGET_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ env.REQUESTED_VARIANT }}-run${{ github.run_number }}
          path: ${{ steps.versioned_name.outputs.apk_versioned_path }}
          retention-days: 14

      - name: Attach APK to GitHub Release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.versioned_name.outputs.apk_versioned_path }}

      - name: Attach APK to latest GitHub Release (manual)
        if: github.event_name == 'workflow_dispatch' && inputs.attach_to_release == true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          if [ -z "$TAG" ]; then
            echo "::error::No existing release found to upload manual artifact."
            exit 1
          fi
          gh release upload "$TAG" "${{ steps.versioned_name.outputs.apk_versioned_path }}" --clobber
